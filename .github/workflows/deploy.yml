name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}:latest
      CONTAINER_NAME: devbrandsite

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository }}:latest"
            CONTAINER="devbrandsite"
            APP_DIR="${HOME}/apps/devbrandsite"
            ENV_FILE="${APP_DIR}/.env"
            HOST_PORT="${{ secrets.APP_HOST_PORT }}"
            CONTAINER_PORT="${{ secrets.APP_CONTAINER_PORT }}"

            if [ -z "$HOST_PORT" ]; then HOST_PORT="80"; fi
            if [ -z "$CONTAINER_PORT" ]; then CONTAINER_PORT="5000"; fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"

            mkdir -p "$APP_DIR"
            if [ ! -f "$ENV_FILE" ]; then
              echo "Missing env file: $ENV_FILE"
              exit 1
            fi

            docker stop "$CONTAINER" || true
            docker rm "$CONTAINER" || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              --env-file "$ENV_FILE" \
              "$IMAGE"

            docker image prune -f
